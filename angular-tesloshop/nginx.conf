server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────
    # Manejo de rutas SPA (Angular)
    # Si la ruta no existe físicamente, se redirige
    # a index.html para que Angular la procese
    # ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────
    # Cacheo de archivos estáticos
    # Mejora rendimiento en el navegador
    # ─────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ─────────────────────────────────────────────
    # Proxy hacia backend
    # Redirige las peticiones /api al servicio backend
    # ─────────────────────────────────────────────
    location ^~ /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }

    # ─────────────────────────────────────────────
    # WebSockets (ej: socket.io)
    # Necesario para conexiones en tiempo real
    # ─────────────────────────────────────────────
    location /socket.io {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        proxy_cache_bypass $http_upgrade;
    }
}