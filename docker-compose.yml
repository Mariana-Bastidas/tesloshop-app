services:

  # ─────────────────────────────────────────────
  # SERVICIO: db
  # Base de datos PostgreSQL
  # Usa imagen oficial (no necesita Dockerfile)
  # ─────────────────────────────────────────────
  db:
    image: postgres:14.3
    container_name: ${POSTGRES_CONTAINER_NAME}   # nombre más fácil de reconocer
    restart: always                              # se reinicia si algo falla
    ports:
      - "${POSTGRES_PUBLISH_PORT}:5432"          # puerto local:contenedor
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data   # guarda los datos
    networks:
      - teslo-network
    healthcheck:
      # Espera a que la DB esté lista antes de que otros servicios la usen
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ─────────────────────────────────────────────
  # SERVICIO: backend
  # API hecha con NestJS
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./teslo-shop      # carpeta del backend
      target: ${STAGE}           # entorno (dev o prod)
      dockerfile: Dockerfile
    container_name: ${BACKEND_CONTAINER_NAME}
    restart: always
    ports:
      - "${BACKEND_PUBLISH_PORT}:${PORT}"
    environment:
      APP_VERSION: ${APP_VERSION}
      STAGE: ${STAGE}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}        # apunta al servicio db
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      PORT: ${PORT}
      HOST_API: ${HOST_API}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./teslo-shop:/app        # para desarrollo (hot reload)
      - /app/node_modules        # evita conflictos con node_modules local
    depends_on:
      db:
        condition: service_healthy   # espera a que la DB esté lista
    networks:
      - teslo-network
    command: yarn start:dev      # modo desarrollo


  # ─────────────────────────────────────────────
  # SERVICIO: frontend
  # Angular servido con Nginx
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./angular-tesloshop
      dockerfile: Dockerfile
    container_name: ${FRONTEND_CONTAINER_NAME}
    restart: always
    ports:
      - "${FRONTEND_PUBLISH_PORT}:80"
    depends_on:
      - backend                  # arranca después del backend
    networks:
      - teslo-network


# ─────────────────────────────────────────────
# VOLÚMENES
# Guarda la info de la base de datos aunque se reinicie
# ─────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local


# ─────────────────────────────────────────────
# REDES
# Permite que los servicios se comuniquen entre sí
# usando sus nombres (como "db" o "backend")
# ─────────────────────────────────────────────
networks:
  teslo-network:
    driver: bridge